<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Communion Space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0e14;
      color: #c0c8d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 12px 20px;
      border-bottom: 1px solid #1a2030;
      background: linear-gradient(180deg, rgba(15, 20, 30, 0.95), rgba(10, 14, 20, 0.98));
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.4em;
      color: #e0e8f0;
      letter-spacing: 3px;
      font-weight: normal;
    }

    .header .subtitle {
      font-size: 0.75em;
      color: #506070;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .tick-counter {
      font-size: 0.7em;
      color: #405060;
      margin-top: 2px;
    }

    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Journal sidebars — dynamically created */
    .journal-panel {
      width: 280px;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1a2030;
      overflow: hidden;
      flex-shrink: 0;
    }

    .journal-panel:last-child {
      border-right: none;
      border-left: 1px solid #1a2030;
    }

    .journal-header {
      padding: 10px 14px;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 1px solid #1a2030;
      flex-shrink: 0;
    }

    .journal-entries {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .journal-entry {
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 4px;
      font-size: 0.8em;
      line-height: 1.4;
      animation: fadeIn 0.4s ease;
    }

    .journal-time {
      font-size: 0.7em;
      color: #405060;
      margin-bottom: 4px;
    }

    /* Room (center panel) */
    .room-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .room-header {
      padding: 10px 14px;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #708090;
      border-bottom: 1px solid #1a2030;
      flex-shrink: 0;
      background: rgba(20, 25, 35, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .room-stats {
      font-size: 0.85em;
      color: #354050;
    }

    .room-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .room-message {
      margin-bottom: 12px;
      animation: fadeIn 0.4s ease;
    }

    .room-message .speaker-name {
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }

    .room-message .message-text {
      font-size: 0.9em;
      line-height: 1.5;
      color: #d0d8e0;
      padding-left: 12px;
      border-left: 2px solid #1a2030;
    }

    .message-time {
      font-size: 0.65em;
      color: #354050;
      margin-top: 2px;
      padding-left: 12px;
    }

    /* Chat input */
    .chat-input-area {
      padding: 10px 14px;
      border-top: 1px solid #1a2030;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background: rgba(10, 14, 20, 0.8);
    }

    .chat-input {
      flex: 1;
      padding: 10px 14px;
      background: rgba(15, 20, 30, 0.8);
      border: 1px solid #1a2030;
      border-radius: 4px;
      color: #c0c8d4;
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
    }

    .chat-input:focus {
      outline: none;
      border-color: #304050;
    }

    .chat-input::placeholder { color: #354050; }

    .send-btn {
      padding: 10px 20px;
      background: rgba(100, 200, 80, 0.1);
      border: 1px solid rgba(100, 200, 80, 0.3);
      border-radius: 4px;
      color: #8eda7e;
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .send-btn:hover {
      background: rgba(100, 200, 80, 0.2);
      border-color: rgba(100, 200, 80, 0.5);
    }

    .error-message {
      padding: 6px 10px;
      margin: 6px 0;
      background: rgba(200, 80, 80, 0.1);
      border-left: 2px solid rgba(200, 80, 80, 0.4);
      color: #da8080;
      font-size: 0.75em;
      border-radius: 2px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a2030; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #253040; }

    .empty-state {
      color: #253040;
      font-size: 0.8em;
      text-align: center;
      padding: 30px 20px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>COMMUNION SPACE</h1>
    <div class="subtitle" id="participantList">Loading...</div>
    <div class="tick-counter" id="tickCounter">tick 0</div>
  </div>

  <div class="main" id="mainLayout">
    <!-- Layout is built dynamically from config -->
    <div class="room-panel" id="roomPanel">
      <div class="room-header">
        <span>The Room</span>
        <span class="room-stats" id="roomStats"></span>
      </div>
      <div class="room-messages" id="roomMessages">
        <div class="empty-state">The room is quiet. Waiting for the first voice...</div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="Speak into the room..." autocomplete="off" />
        <button id="sendBtn" class="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const eventSource = new EventSource('/events');
    const mainLayout = document.getElementById('mainLayout');
    const roomPanel = document.getElementById('roomPanel');
    const roomMessages = document.getElementById('roomMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const tickCounter = document.getElementById('tickCounter');
    const participantList = document.getElementById('participantList');
    const roomStats = document.getElementById('roomStats');

    // Dynamic state
    let config = null;
    let roomHasMessages = false;
    let journalPanels = {}; // agentId → { container, entries, hasEntries }
    let messageCount = 0;

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function formatTime(timestamp) {
      return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /**
     * Build the layout dynamically from config.
     * Journals on the sides, room in the center.
     * If odd number: more journals on the left.
     */
    function buildLayout(cfg) {
      config = cfg;
      const agents = cfg.agentIds;
      const half = Math.ceil(agents.length / 2);
      const leftAgents = agents.slice(0, half);
      const rightAgents = agents.slice(half);

      // Remove room panel temporarily
      roomPanel.remove();

      // Clear layout
      mainLayout.innerHTML = '';

      // Left journals
      for (const agentId of leftAgents) {
        mainLayout.appendChild(createJournalPanel(agentId, cfg));
      }

      // Room in center
      mainLayout.appendChild(roomPanel);

      // Right journals
      for (const agentId of rightAgents) {
        mainLayout.appendChild(createJournalPanel(agentId, cfg));
      }

      // Update subtitle
      const names = agents.map(id => cfg.agentNames[id]);
      names.push(cfg.humanName);
      participantList.textContent = names.join(' · ');
    }

    function createJournalPanel(agentId, cfg) {
      const color = cfg.agentColors[agentId] || '#7eb8da';
      const name = cfg.agentNames[agentId] || agentId;

      const panel = document.createElement('div');
      panel.className = 'journal-panel';

      const header = document.createElement('div');
      header.className = 'journal-header';
      header.style.color = color;
      header.style.background = hexToRgba(color, 0.05);
      header.textContent = `${name}'s Journal`;
      panel.appendChild(header);

      const entries = document.createElement('div');
      entries.className = 'journal-entries';
      entries.innerHTML = '<div class="empty-state">Waiting for first reflection...</div>';
      panel.appendChild(entries);

      journalPanels[agentId] = { container: panel, entries, hasEntries: false, color };
      return panel;
    }

    function addRoomMessage(speaker, speakerName, text, timestamp) {
      if (!roomHasMessages) {
        roomMessages.innerHTML = '';
        roomHasMessages = true;
      }

      const color = config ? (config.agentColors[speaker] || '#8eda7e') : '#8eda7e';

      const div = document.createElement('div');
      div.className = 'room-message';
      div.innerHTML = `
        <div class="speaker-name" style="color: ${color}">${escapeHtml(speakerName)}</div>
        <div class="message-text" style="border-left-color: ${hexToRgba(color, 0.3)}">${escapeHtml(text)}</div>
        <div class="message-time">${formatTime(timestamp)}</div>
      `;

      roomMessages.appendChild(div);
      roomMessages.scrollTop = roomMessages.scrollHeight;
      messageCount++;
      roomStats.textContent = `${messageCount} messages`;
    }

    function addJournalEntry(agentId, text, timestamp) {
      const panel = journalPanels[agentId];
      if (!panel) return;

      if (!panel.hasEntries) {
        panel.entries.innerHTML = '';
        panel.hasEntries = true;
      }

      const div = document.createElement('div');
      div.className = 'journal-entry';
      div.style.background = hexToRgba(panel.color, 0.08);
      div.style.borderLeft = `2px solid ${hexToRgba(panel.color, 0.3)}`;
      div.style.color = panel.color;
      div.innerHTML = `
        <div class="journal-time">${formatTime(timestamp)}</div>
        ${escapeHtml(text)}
      `;

      panel.entries.appendChild(div);
      panel.entries.scrollTop = panel.entries.scrollHeight;
    }

    eventSource.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'config') {
        buildLayout(data);
      } else if (data.type === 'room-message') {
        addRoomMessage(data.speaker, data.speakerName, data.text, data.timestamp);
      } else if (data.type === 'journal-entry') {
        addJournalEntry(data.speaker, data.text, data.timestamp);
      } else if (data.type === 'tick') {
        tickCounter.textContent = `tick ${data.tickCount}`;
      } else if (data.type === 'error') {
        const div = document.createElement('div');
        div.className = 'error-message';
        div.textContent = `[${data.agentId}] ${data.error}`;
        roomMessages.appendChild(div);
        roomMessages.scrollTop = roomMessages.scrollHeight;
      }
    };

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = '';
      try {
        await fetch('/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
      } catch (err) {
        console.error('Send error:', err);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    chatInput.focus();
  </script>
</body>
</html>
